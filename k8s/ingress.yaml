apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sql-agent-ingress
  namespace: sql-analytics-agent
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sql-agent-service
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: sql-agent-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sql-agent-service
                port:
                  number: 8501
