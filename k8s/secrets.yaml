# Author: Suresh D R | AI Product Developer & Technology Mentor
#
# IMPORTANT: Do not put real values in this file. Real secrets are
# injected directly via the terminal using:
#
#   kubectl create secret generic sql-agent-secrets \
#     --from-literal=OPENAI_API_KEY=YOUR_KEY \
#     --from-literal=AWS_ACCESS_KEY_ID=YOUR_KEY \
#     --from-literal=AWS_SECRET_ACCESS_KEY=YOUR_SECRET \
#     --from-literal=RDS_HOST=YOUR_RDS_ENDPOINT \
#     --from-literal=RDS_PASSWORD=YOUR_READONLY_USER_PASSWORD \
#     --from-literal=LANGCHAIN_API_KEY=YOUR_LANGSMITH_KEY \
#     --namespace sql-analytics-agent \
#     --dry-run=client -o yaml | kubectl apply -f - --validate=false
#
# This file exists only so `kubectl apply -f k8s/` doesn't error on a
# missing reference -- it is overwritten by the command above.
apiVersion: v1
kind: Secret
metadata:
  name: sql-agent-secrets
  namespace: sql-analytics-agent
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
  AWS_ACCESS_KEY_ID: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
  AWS_SECRET_ACCESS_KEY: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
  RDS_HOST: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
  RDS_PASSWORD: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
  LANGCHAIN_API_KEY: "REPLACE_VIA_KUBECTL_CREATE_SECRET"
